
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NeuraVault — Creator Nexus</title>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<div class="bg-grid"></div>

<nav>
<div class="nav-logo">Neura<span class="dot">●</span>Vault</div>

<div class="nav-right">
<span id="nav-user"></span>
<button class="btn btn-ghost" onclick="doLogout()">Sign Out</button>
</div>
</nav>

<div class="page">
<div class="dashboard">

<div class="sidebar glass">
<a href="#" class="sidebar-link active" id="link-upload" onclick="showSection('upload');return false">Upload Media</a>
<a href="#" class="sidebar-link" id="link-photos" onclick="showSection('photos');return false">Media Vault</a>
</div>

<div class="content glass">

<div id="section-upload">
<div class="section-title">Upload Media</div>

<div class="upload-layout">

<div>
<div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
<input type="file" id="file-input" accept="image/jpeg,image/png,image/webp,image/gif" onchange="handleFile(event)"/>
<div class="upload-icon">📸</div>
<h2>Drop image here</h2>
<p>JPG PNG WEBP GIF</p>
</div>

<div class="preview-wrap" id="preview-wrap">
<img id="preview-img" src=""/>
</div>
</div>

<div>

<div class="form-group">
<label>Title</label>
<input class="form-control" type="text" id="u-title"/>
</div>

<div class="form-group">
<label>Caption</label>
<textarea class="form-control" id="u-caption"></textarea>
</div>

<div class="form-group">
<label>Location</label>
<input class="form-control" type="text" id="u-location"/>
</div>

<div class="form-group">
<label>People Present</label>
<input class="form-control" type="text" id="u-people"/>
</div>

<div class="alert alert-error" id="upload-err"></div>
<div class="alert alert-success" id="upload-ok"></div>

<button class="btn btn-primary" style="width:100%" id="upload-btn" onclick="uploadPhoto()">
<span id="upload-btn-txt">Upload to NeuraVault</span>
<span id="upload-ld" style="display:none"></span>
</button>

</div>

</div>
</div>

<div id="section-photos" style="display:none">
<div class="section-title">Media Vault</div>
<div id="my-grid" class="photo-grid"></div>
</div>

</div>
</div>
</div>

<script src="/static/js/auth.js"></script>
<script src="/static/js/creator.js"></script>
</body>
</html>
