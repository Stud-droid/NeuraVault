<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NeuraVault — Sign In</title>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="bg-grid"></div>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-left">
      <div class="login-logo">Neura<span class="dot">●</span>Vault</div>
      <p class="login-tagline">
        Futuristic AI-powered media vault.<br>
        Secure uploads. Instant sharing. Modern creator workflow.
      </p>
    </div>

    <div class="login-right">
      <h1>Welcome Back</h1>

      <div class="alert alert-error" id="aerr"></div>
      <div class="alert alert-success" id="aok"></div>

      <div id="form-in">
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" type="email" id="in-email"/>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" id="in-pw"/>
        </div>

        <button class="btn btn-primary btn-full" id="btn-in" onclick="doLogin()">
          <span id="btn-in-txt">Sign In</span>
          <span id="btn-in-ld" style="display:none"></span>
        </button>
      </div>
    </div>

  </div>
</div>

<script src="/static/js/auth.js"></script>
</body>
</html>
