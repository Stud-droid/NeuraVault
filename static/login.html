
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NeuraVault — Access Portal</title>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="bg-grid"></div>

<div class="login-wrap">
<div class="login-card glass">

<div class="login-left">
<div class="hero-title">Neura<span class="dot">●</span>Vault</div>
<p class="hero-sub">
AI-powered futuristic media vault platform.<br>
Secure uploads. Intelligent sharing. Immersive creator experience.
</p>
</div>

<div class="login-right">
<h1 class="section-title">Welcome Back</h1>

<div class="alert alert-error" id="aerr"></div>
<div class="alert alert-success" id="aok"></div>

<div class="form-group">
<label>Email</label>
<input class="form-control" type="email" id="in-email" placeholder="you@example.com"/>
</div>

<div class="form-group">
<label>Password</label>
<input class="form-control" type="password" id="in-pw" placeholder="Your password"/>
</div>

<button class="btn btn-primary" style="width:100%" id="btn-in" onclick="doLogin()">
<span id="btn-in-txt">Sign In</span>
<span id="btn-in-ld" style="display:none"></span>
</button>

</div>
</div>
</div>

<script src="/static/js/auth.js"></script>
</body>
</html>
