<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NueraVault — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .bg-orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.4; z-index: -1; }
    .bg-orb-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: #6366f1; }
    .bg-orb-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #a855f7; }
    .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .tab-btn { padding: 0.75rem 1rem; color: #94a3b8; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab-btn.active { color: #818cf8; border-bottom-color: #818cf8; font-weight: 500; }
    .alert { padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; display: none; font-size: 0.875rem; }
    .alert-error { background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2); }
    .alert-success { background: rgba(34, 197, 94, 0.1); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.2); }
    .loader-inline { display: inline-block; width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden p-4">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="glass-card w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col md:flex-row overflow-hidden">
    
    <div class="w-full md:w-5/12 bg-slate-800/50 p-10 flex flex-col justify-between border-b md:border-b-0 md:border-r border-white/10">
      <div>
        <div class="text-3xl font-bold tracking-tight">Nuera<span class="text-indigo-400">✦</span>Vault</div>
        <p class="text-slate-400 mt-4 text-sm leading-relaxed">Cloud-native photo sharing.<br/>Built on Azure. Built to scale.</p>
      </div>
      
      <div class="space-y-6 mt-10">
        <div class="flex gap-4 items-start">
          <div class="bg-indigo-500/20 p-2 rounded-lg text-indigo-400">🔐</div>
          <div><h4 class="text-sm font-semibold text-slate-200">Role-Based Auth</h4><p class="text-xs text-slate-400">Creator & Consumer access levels</p></div>
        </div>
        <div class="flex gap-4 items-start">
          <div class="bg-purple-500/20 p-2 rounded-lg text-purple-400">📸</div>
          <div><h4 class="text-sm font-semibold text-slate-200">Photo Sharing</h4><p class="text-xs text-slate-400">Rich metadata & AI tagging</p></div>
        </div>
      </div>
    </div>

    <div class="w-full md:w-7/12 p-10">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-white">Welcome back</h2>
        <p class="text-sm text-slate-400 mt-1">Sign in or create a consumer account</p>
      </div>

      <div class="flex border-b border-slate-700 mb-6 gap-4">
        <button class="tab-btn active" id="tab-in" onclick="switchTab('in')">Sign In</button>
        <button class="tab-btn" id="tab-reg" onclick="switchTab('reg')">Register</button>
      </div>

      <div class="alert alert-error" id="aerr"></div>
      <div class="alert alert-success" id="aok"></div>

      <div id="form-in" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
          <input class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition-colors" type="email" id="in-email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
          <div class="relative">
            <input class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition-colors" type="password" id="in-pw" placeholder="Your password" autocomplete="current-password"/>
            <button class="absolute right-3 top-2.5 text-slate-400 hover:text-white" onclick="togglePw('in-pw',this)">👁</button>
          </div>
        </div>
        <button class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-lg transition-colors flex justify-center items-center gap-2 mt-2" id="btn-in" onclick="doLogin()">
          <span id="btn-in-txt">Sign In</span>
          <span class="loader-inline" id="btn-in-ld" style="display:none"></span>
        </button>
        <!-- <div class="bg-slate-800/50 p-4 rounded-lg text-xs text-slate-400 mt-6 border border-slate-700/50">
          <strong class="text-slate-200">Creator:</strong> creator@nueravault.com / Creator123!<br/>
          <strong class="text-slate-200">Consumer:</strong> Register below or use consumer@nueravault.com
        </div> -->
      </div>

      <div id="form-reg" class="space-y-5" style="display:none">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Username</label>
          <input class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition-colors" type="text" id="reg-user" placeholder="Choose a username"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
          <input class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition-colors" type="email" id="reg-email" placeholder="you@example.com"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
          <div class="relative">
            <input class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition-colors" type="password" id="reg-pw" placeholder="Minimum 8 characters"/>
            <button class="absolute right-3 top-2.5 text-slate-400 hover:text-white" onclick="togglePw('reg-pw',this)">👁</button>
          </div>
        </div>
        <button class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-lg transition-colors flex justify-center items-center gap-2 mt-2" id="btn-reg" onclick="doRegister()">
          <span id="btn-reg-txt">Create Account</span>
          <span class="loader-inline" id="btn-reg-ld" style="display:none"></span>
        </button>
      </div>

    </div>
  </div>

  <div class="fixed bottom-5 right-5 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg border border-slate-700 flex items-center gap-3 transition-opacity duration-300 opacity-0 pointer-events-none" id="toast">
    <div class="w-2 h-2 rounded-full bg-green-400"></div><span id="toast-msg" class="text-sm"></span>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    (function(){const t=getToken(),r=getRole();if(t)window.location.href=r==='creator'?'/studio':'/browse';})();

    function switchTab(t){
      document.getElementById('form-in').style.display=t==='in'?'block':'none';
      document.getElementById('form-reg').style.display=t==='reg'?'block':'none';
      document.getElementById('tab-in').classList.toggle('active',t==='in');
      document.getElementById('tab-reg').classList.toggle('active',t==='reg');
      clearAlerts();
    }
    function clearAlerts(){['aerr','aok'].forEach(id=>document.getElementById(id).style.display='none');}
    function showAlert(type,msg){clearAlerts();const el=document.getElementById(type==='err'?'aerr':'aok');el.textContent=msg;el.style.display='block';}
    function setBusy(f,b){document.getElementById('btn-'+f+'-txt').style.display=b?'none':'inline';document.getElementById('btn-'+f+'-ld').style.display=b?'inline-block':'none';document.getElementById('btn-'+f).disabled=b;}
    function togglePw(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈';}

    async function doLogin(){
      clearAlerts();
      const email=document.getElementById('in-email').value.trim();
      const pw=document.getElementById('in-pw').value;
      if(!email)return showAlert('err','Please enter your email.');
      if(!pw)return showAlert('err','Please enter your password.');
      setBusy('in',true);
      try{const r=await login(email,pw);window.location.href=r.role==='creator'?'/studio':'/browse';}
      catch(e){showAlert('err',e.message||'Login failed.');}
      finally{setBusy('in',false);}
    }

    async function doRegister(){
      clearAlerts();
      const u=document.getElementById('reg-user').value.trim();
      const e=document.getElementById('reg-email').value.trim();
      const p=document.getElementById('reg-pw').value;
      if(!u||!e)return showAlert('err','All fields required.');
      if(p.length<8)return showAlert('err','Password must be at least 8 characters.');
      setBusy('reg',true);
      try{await register(u,e,p);showAlert('ok','✓ Account created! Sign in now.');setTimeout(()=>switchTab('in'),1500);}
      catch(e){showAlert('err',e.message);}
      finally{setBusy('reg',false);}
    }
    document.addEventListener('keydown',e=>{if(e.key!=='Enter')return;if(document.getElementById('form-in').style.display!=='none')doLogin();else doRegister();});
    
    // Quick toast override for styles
    window.showToast = function(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-msg').textContent = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }
  </script>
</body>
</html>
