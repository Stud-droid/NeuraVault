<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NeuraVault — Photo</title>
  <link rel="stylesheet" href="/static/css/style.css"/>

<link rel="stylesheet" href="/static/css/futuristic-theme.css"/>
</head>
<body>
<div class="bg-grid"></div>
<nav>
  <div class="nav-logo">Pixel<span class="dot">●</span>Den</div>
  <div class="nav-links"><a href="/browse" class="nav-link">← Back to Browse</a></div>
  <div class="nav-right">
    <span class="nav-chip" id="nav-chip">CONSUMER</span>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign Out</button>
  </div>
</nav>

<div class="container page-wrap">
  <div id="page-loader" class="loader-wrap"><div class="spinner"></div><span>Loading photo…</span></div>

  <div id="photo-content" style="display:none">
    <div class="detail-grid">

      <!-- IMAGE -->
      <div>
        <div class="detail-img-wrap">
          <img id="photo-img" src="" alt=""/>
        </div>
        <div id="ai-tags-wrap" style="display:none;margin-top:1rem">
          <div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">🤖 AI-detected tags</div>
          <div class="tags-row" id="ai-tags"></div>
        </div>
      </div>

      <!-- SIDEBAR -->
      <div class="detail-sidebar">

        <div class="detail-panel">
          <h1 class="detail-title" id="photo-title">—</h1>
          <div class="meta-row"><span class="meta-key">Caption</span><span class="meta-val" id="photo-caption">—</span></div>
          <div class="meta-row"><span class="meta-key">Location</span><span class="meta-val" id="photo-location">—</span></div>
          <div class="meta-row"><span class="meta-key">People</span><span class="meta-val" id="photo-people">—</span></div>
          <div class="meta-row"><span class="meta-key">Creator</span><span class="meta-val" id="photo-creator">—</span></div>
          <div class="meta-row"><span class="meta-key">Uploaded</span><span class="meta-val" id="photo-date">—</span></div>
          <div class="rating-display" style="border-top:1px solid var(--border);padding-top:1.2rem;margin-top:1.2rem">
            <div class="rating-num" id="avg-rating">—</div>
            <div class="stars" id="avg-stars"></div>
            <div class="rating-sub" id="rating-count">0 ratings</div>
          </div>
        </div>

        <div class="detail-panel">
          <div class="panel-title">Add a Comment</div>
          <div style="margin-bottom:1rem">
            <div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Your Rating (optional)</div>
            <div class="stars-input" id="star-input">
              <span class="star" data-v="1" onclick="setRating(1)">★</span>
              <span class="star" data-v="2" onclick="setRating(2)">★</span>
              <span class="star" data-v="3" onclick="setRating(3)">★</span>
              <span class="star" data-v="4" onclick="setRating(4)">★</span>
              <span class="star" data-v="5" onclick="setRating(5)">★</span>
            </div>
          </div>
          <div class="form-group">
            <label>Comment</label>
            <textarea class="form-control" id="comment-text" placeholder="Share your thoughts…"></textarea>
          </div>
          <button class="btn btn-primary btn-full" id="comment-btn" onclick="submitComment()">
            <span id="comment-btn-txt">Post Comment</span>
            <span class="loader-inline" id="comment-ld" style="display:none"></span>
          </button>
        </div>

        <div class="detail-panel">
          <div class="panel-title">Comments</div>
          <div id="comments-list"><div class="loader-wrap" style="padding:1.5rem"><div class="spinner"></div></div></div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="/static/js/auth.js"></script>
<script src="/static/js/consumer.js"></script>
<script>
  requireAuth();
  let selectedRating=0;
  function setRating(v){selectedRating=v;document.querySelectorAll('#star-input .star').forEach(s=>s.classList.toggle('active',parseInt(s.dataset.v)<=v));}
  window.addEventListener('DOMContentLoaded',()=>{
    const id=new URLSearchParams(window.location.search).get('id');
    if(!id){window.location.href='/browse';return;}
    loadPhotoDetail(id);
  });
</script>
</body>
</html>
