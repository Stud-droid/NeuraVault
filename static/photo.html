<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NueraVault — Photo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    .spinner { width: 2.5rem; height: 2.5rem; border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-inline { display: inline-block; width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; }
    .star { font-size: 1.5rem; color: #cbd5e1; cursor: pointer; transition: color 0.2s; }
    .star:hover, .star.active { color: #fbbf24; }
    .meta-grid { display: grid; grid-template-columns: 80px 1fr; gap: 0.5rem; font-size: 0.875rem; align-items: start; margin-bottom: 0.5rem; }
  </style>
</head>
<body class="min-h-screen pb-12">
  
  <nav class="glass-nav sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-6">
      <a href="/browse" class="text-slate-500 hover:text-indigo-600 transition-colors flex items-center gap-2 font-medium"><span>←</span> Back</a>
      <div class="h-6 w-px bg-slate-200"></div>
      <div class="text-xl font-bold tracking-tight">Nuera<span class="text-indigo-600">✦</span>Vault</div>
    </div>
    <div class="flex items-center gap-4">
      <span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-bold tracking-wide" id="nav-chip">CONSUMER</span>
      <button class="text-sm text-slate-500 hover:text-slate-800 transition-colors" onclick="doLogout()">Sign Out</button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 mt-8">
    <div id="page-loader" class="flex flex-col items-center justify-center py-32 text-slate-500"><div class="spinner"></div><span>Loading high-res photo…</span></div>

    <div id="photo-content" style="display:none" class="flex flex-col lg:flex-row gap-8 items-start">
      
      <div class="w-full lg:w-2/3">
        <div class="bg-white rounded-2xl p-2 shadow-sm border border-slate-200 overflow-hidden">
          <img id="photo-img" src="" alt="" class="w-full h-auto rounded-xl object-contain bg-slate-100 max-h-[70vh]"/>
        </div>
        
        <div id="ai-tags-wrap" class="mt-6 bg-white p-4 rounded-xl shadow-sm border border-slate-200" style="display:none">
          <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-wider mb-3"><span>🤖</span> AI-detected tags</div>
          <div class="flex flex-wrap gap-2" id="ai-tags"></div>
        </div>
      </div>

      <div class="w-full lg:w-1/3 flex flex-col gap-6 sticky top-24">
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <h1 class="text-2xl font-bold text-slate-800 mb-6" id="photo-title">—</h1>
          
          <div class="space-y-1">
            <div class="meta-grid"><span class="text-slate-400 font-medium">Caption</span><span class="text-slate-700" id="photo-caption">—</span></div>
            <div class="meta-grid"><span class="text-slate-400 font-medium">Location</span><span class="text-slate-700 font-medium" id="photo-location">—</span></div>
            <div class="meta-grid"><span class="text-slate-400 font-medium">People</span><span class="text-indigo-600 font-medium" id="photo-people">—</span></div>
            <div class="meta-grid"><span class="text-slate-400 font-medium">Creator</span><span class="text-slate-700 font-bold" id="photo-creator">—</span></div>
            <div class="meta-grid"><span class="text-slate-400 font-medium">Uploaded</span><span class="text-slate-500 text-sm" id="photo-date">—</span></div>
          </div>

          <div class="mt-6 pt-6 border-t border-slate-100 flex items-center justify-between">
            <div>
              <div class="text-3xl font-black text-slate-800" id="avg-rating">—</div>
              <div class="text-xs font-medium text-slate-400 mt-1 uppercase tracking-wide" id="rating-count">0 ratings</div>
            </div>
            <div class="text-xl text-yellow-400 tracking-widest" id="avg-stars"></div>
          </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <h3 class="text-lg font-bold text-slate-800 mb-4">Add a Comment</h3>
          <div class="mb-4">
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Your Rating (optional)</div>
            <div class="flex gap-1" id="star-input">
              <span class="star" data-v="1" onclick="setRating(1)">★</span>
              <span class="star" data-v="2" onclick="setRating(2)">★</span>
              <span class="star" data-v="3" onclick="setRating(3)">★</span>
              <span class="star" data-v="4" onclick="setRating(4)">★</span>
              <span class="star" data-v="5" onclick="setRating(5)">★</span>
            </div>
          </div>
          <div class="mb-4">
            <textarea class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-3 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all resize-none" id="comment-text" rows="3" placeholder="Share your thoughts…"></textarea>
          </div>
          <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition-colors flex justify-center items-center gap-2" id="comment-btn" onclick="submitComment()">
            <span id="comment-btn-txt">Post Comment</span>
            <span class="loader-inline" id="comment-ld" style="display:none"></span>
          </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <h3 class="text-lg font-bold text-slate-800 mb-4">Comments</h3>
          <div id="comments-list" class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
            <div class="flex justify-center py-6 text-slate-400"><div class="spinner !w-6 !h-6 !border-2"></div></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="fixed bottom-5 right-5 bg-slate-900 text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-3 transition-opacity duration-300 opacity-0 pointer-events-none z-50" id="toast">
    <div class="w-2 h-2 rounded-full bg-green-400"></div><span id="toast-msg" class="text-sm"></span>
  </div>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/consumer.js"></script>
  <script>
    requireAuth();
    let selectedRating=0;
    function setRating(v){selectedRating=v;document.querySelectorAll('#star-input .star').forEach(s=>s.classList.toggle('active',parseInt(s.dataset.v)<=v));}
    window.addEventListener('DOMContentLoaded',()=>{
      const id=new URLSearchParams(window.location.search).get('id');
      if(!id){window.location.href='/browse';return;}
      loadPhotoDetail(id);
    });
    window.showToast = function(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-msg').textContent = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }
  </script>
</body>
</html>
