
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NeuraVault — Media View</title>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<div class="bg-grid"></div>

<nav>
<div class="nav-logo">Neura<span class="dot">●</span>Vault</div>
</nav>

<div class="page">

<div class="detail-layout">

<div class="detail-image">
<img id="photo-img" src=""/>
</div>

<div class="detail-side">

<div class="panel glass">

<h1 class="section-title" id="photo-title">Media</h1>

<div class="meta-row">
<span class="meta-key">Caption</span>
<span id="photo-caption">—</span>
</div>

<div class="meta-row">
<span class="meta-key">Location</span>
<span id="photo-location">—</span>
</div>

<div class="meta-row">
<span class="meta-key">People</span>
<span id="photo-people">—</span>
</div>

</div>

<div class="panel glass">

<div class="form-group">
<label>Comment</label>
<textarea class="form-control" id="comment-text"></textarea>
</div>

<button class="btn btn-primary" style="width:100%" id="comment-btn" onclick="submitComment()">
<span id="comment-btn-txt">Post Comment</span>
<span id="comment-ld" style="display:none"></span>
</button>

</div>

</div>

</div>

</div>

<script src="/static/js/auth.js"></script>
<script src="/static/js/consumer.js"></script>
</body>
</html>
