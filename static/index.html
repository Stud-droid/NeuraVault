<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NueraVault — Browse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    .loader-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem; color: #64748b; }
    .spinner { width: 2rem; height: 2rem; border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen pb-12">
  
  <nav class="glass-nav sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-8">
      <div class="text-xl font-bold tracking-tight">Nuera<span class="text-indigo-600">✦</span>Vault</div>
      <div class="hidden md:flex gap-4">
        <a href="/browse" class="text-indigo-600 font-medium">Browse</a>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-bold tracking-wide" id="nav-chip">CONSUMER</span>
      <span class="text-sm text-slate-500 font-medium" id="nav-user"></span>
      <button class="text-sm text-slate-500 hover:text-slate-800 transition-colors" onclick="doLogout()">Sign Out</button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 mt-10">
    <div class="mb-10 text-center md:text-left">
      <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 mb-2">Explore <span class="text-indigo-600">Photos</span></h1>
      <p class="text-slate-500">Discover incredible content uploaded by creators globally.</p>
    </div>

    <div class="flex flex-col md:flex-row gap-4 mb-8 bg-white p-2 rounded-xl shadow-sm border border-slate-200">
      <div class="flex-1 relative">
        <span class="absolute left-4 top-3 text-slate-400">🔍</span>
        <input class="w-full bg-transparent pl-12 pr-4 py-3 outline-none text-slate-700 placeholder-slate-400" id="search-input" placeholder="Search by title, tag, location…" type="text"/>
      </div>
      <div class="flex gap-2 p-1">
        <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-colors" onclick="doSearch()">Search</button>
        <button class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-6 py-2 rounded-lg font-medium transition-colors" onclick="clearSearch()">Clear</button>
      </div>
    </div>

    <div id="search-label" class="text-sm text-indigo-600 font-medium mb-6" style="display:none"></div>
    
    <div id="photo-grid" class="photo-grid"></div>
    <div id="grid-loader" class="loader-wrap" style="display:none"><div class="spinner"></div><span>Loading photos…</span></div>
    
    <div id="empty" class="bg-white border border-slate-200 rounded-2xl p-12 text-center" style="display:none">
      <div class="text-5xl mb-4">📷</div>
      <div class="text-xl font-bold text-slate-800 mb-2">No photos found</div>
      <div class="text-slate-500">Try a different search or check back later</div>
    </div>

    <div class="text-center mt-12" id="load-more-wrap" style="display:none">
      <button class="border-2 border-slate-200 hover:border-indigo-600 hover:text-indigo-600 text-slate-600 px-8 py-3 rounded-xl font-medium transition-colors" id="load-more-btn" onclick="loadMore()">Load More</button>
    </div>
  </div>

  <div class="fixed bottom-5 right-5 bg-slate-900 text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-3 transition-opacity duration-300 opacity-0 pointer-events-none z-50" id="toast">
    <div class="w-2 h-2 rounded-full bg-green-400"></div><span id="toast-msg" class="text-sm"></span>
  </div>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/consumer.js"></script>
  <script>
    requireAuth();
    window.addEventListener('DOMContentLoaded',()=>{
      const u=localStorage.getItem('sv_username');
      if(u){document.getElementById('nav-user').textContent=u;document.getElementById('nav-chip').textContent=(localStorage.getItem('sv_role')||'consumer').toUpperCase();}
      loadPhotos();
      document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
    });
    window.showToast = function(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-msg').textContent = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }
  </script>
</body>
</html>
